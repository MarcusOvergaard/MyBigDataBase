name: phase1-contract

on:
  push:
  pull_request:

jobs:
  verify-phase1-path:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PGPASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify Phase 1 contract path end to end
        run: |
          make init load-sample build-mart test repeat-load-test \
            DB_HOST=localhost \
            DB_PORT=5432 \
            DB_USER=postgres

  verify-offline-live-contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PGPASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify offline live contract suite and Phase 2 starter marts
        run: |
          make init build-mart test-live-contracts-offline test-phase2-starter-marts-offline \
            DB_HOST=localhost \
            DB_PORT=5432 \
            DB_USER=postgres
